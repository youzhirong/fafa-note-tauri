# 推送 v* 标签时，在三大平台构建+签名 fafa-note 桌面端，
# 并把安装包与更新清单 latest.json 发布到 GitHub Release（供应用内自动更新）。
#
# 前置：在仓库 Secrets 配置 TAURI_SIGNING_PRIVATE_KEY / TAURI_SIGNING_PRIVATE_KEY_PASSWORD，
# 并在 tauri.conf.json 开启 bundle.createUpdaterArtifacts + 配置 plugins.updater。
# 详见 docs/auto-update-github.md。
name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write # 需要写权限来创建 Release / 上传产物
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest # Intel
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        run: npm ci

      # 把 app.config.json（版本/产品名等唯一来源）同步进 package.json / tauri.conf.json / Cargo.toml，
      # 确保 tauri-action 读到的版本与 app.config.json 一致（发版只改 app.config.json 一处）。
      - name: Sync app metadata from app.config.json
        run: node scripts/sync-app-config.mjs

      # 仓库默认 createUpdaterArtifacts=false（保证本地无签名也能出包）；
      # 发布时这里临时打开，让 CI 生成签名更新产物 + latest.json。
      - name: Enable updater artifacts for release
        shell: bash
        run: |
          node -e "const f='src-tauri/tauri.conf.json';const c=require('./'+f);c.bundle.createUpdaterArtifacts=true;require('fs').writeFileSync(f,JSON.stringify(c,null,2)+'\n')"

      - name: Build & release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 更新包签名（与 tauri.conf.json 里的 pubkey 对应）
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'fafa-note ${{ github.ref_name }}'
          releaseBody: '下载下方对应平台的安装包；已安装的旧版本可在「关于 → 检查更新」自助升级。'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          # 生成并上传 latest.json（自动更新清单）
          includeUpdaterJson: true

  # 所有平台构建完成后，基于 GitHub 的 latest.json 生成「镜像版」清单 latest-proxy.json
  # （把内部下载地址加上镜像前缀），供国内客户端走镜像检查并下载，绕开 github.com 被墙。
  # tauri.conf.json 的 updater endpoints 第一个就指向它（见 scripts/sync-app-config.mjs）。
  proxy-manifest:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download latest.json from the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${{ github.ref_name }}" -R "${{ github.repository }}" -p latest.json --clobber

      - name: Build mirrored manifest (latest-proxy.json)
        run: node scripts/make-proxy-manifest.mjs latest.json latest-proxy.json

      - name: Upload latest-proxy.json to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" latest-proxy.json -R "${{ github.repository }}" --clobber
